name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 2 * * 0'  # weekly Sunday 2am UTC for mutants
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  gatekeeper:
    name: Gatekeeper (fmt + clippy + doc)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: plugin/tests/verify_action_pins.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: RUSTDOCFLAGS="-D warnings" cargo doc --no-deps --all-features

  msrv:
    name: MSRV (Rust 1.88)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      # Unified workspace MSRV. 1.88 is forced by anamnesis-mcp's rmcp/schemars
      # dep tree (darling 0.23 requires rustc 1.88); the library builds on less
      # but the whole workspace tracks one MSRV.
      - run: cargo check --all-targets --all-features

  test:
    name: Test (nextest + doctest)
    needs: [gatekeeper, msrv]
    runs-on: ubuntu-latest
    env:
      # Full DWARF on ~40 --all-features test binaries exceeds the runner's
      # disk (ld SIGBUS / "No space left on device"). Line tables keep
      # backtraces useful at a fraction of the size.
      CARGO_PROFILE_DEV_DEBUG: line-tables-only
    steps:
      - name: Free runner disk space (preinstalled toolchains we never use)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          df -h / | tail -1
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --all-features
      - run: cargo test --doc --all-features
      - name: Compile all test and bench targets without running long benchmarks
        run: cargo test --all-targets --all-features --no-run -j2

  embed-smoke:
    name: FastEmbed smoke test
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p anamnesis --features embed --test fastembed_provider -- --ignored --test-threads=1

  coverage:
    name: Coverage
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: cargo llvm-cov --all-features --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          fail_ci_if_error: false

  semver:
    name: Semver check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      - name: semver check (skip when the package is new to the baseline)
        run: |
          if git show origin/main:crates/anamnesis/Cargo.toml 2>/dev/null | grep -q 'name = "anamnesis-engine"'; then
            cargo semver-checks --package anamnesis-engine --baseline-rev origin/main
          else
            echo "::notice::anamnesis-engine is new to the baseline (package rename); skipping semver this run"
          fi

  deny:
    name: Cargo deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: EmbarkStudios/cargo-deny-action@v2

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run benchmarks
        run: |
          set -o pipefail
          cargo bench --bench ingestion --bench graph_crud --bench storage --bench memory_usage --bench engine_ops -- --output-format bencher 2>&1 | tee output.txt
      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'cargo'
          output-file-path: output.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          comment-on-alert: true
          alert-threshold: '15%'
          summary-always: true
          auto-push: true
          gh-pages-branch: gh-pages

  mutants:
    name: Mutation testing
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants
      - run: cargo mutants --no-shuffle -vV --timeout 60
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mutants-report
          path: mutants.out
          if-no-files-found: ignore
