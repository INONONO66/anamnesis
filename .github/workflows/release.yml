name: release

on:
  push:
    tags: ["v*"]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: validate release tag and lockstep versions
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: plugin/tests/verify_release_tag.sh "$RELEASE_TAG"

  build:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,         target: aarch64-apple-darwin,      asset: anamnesis-darwin-arm64, ext: "" }
          - { os: macos-14,         target: x86_64-apple-darwin,       asset: anamnesis-darwin-x64,   ext: "" }
          - { os: ubuntu-22.04,     target: x86_64-unknown-linux-gnu,  asset: anamnesis-linux-x64,    ext: "" }
          - { os: ubuntu-22.04-arm, target: aarch64-unknown-linux-gnu, asset: anamnesis-linux-arm64,  ext: "" }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.target }}" }
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin anamnesis --target ${{ matrix.target }}
      - name: stage release asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/anamnesis${{ matrix.ext }}" "dist/${{ matrix.asset }}${{ matrix.ext }}"
          chmod 755 "dist/${{ matrix.asset }}${{ matrix.ext }}" || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: "${{ matrix.asset }}", path: "dist/${{ matrix.asset }}${{ matrix.ext }}" }

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: write, id-token: write }
    env:
      HAS_NPM_BOOTSTRAP_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { path: artifacts }
      - name: collect assets and compute SHA256SUMS.txt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          # Flatten the per-artifact download dirs (artifacts/<asset>/<asset>) into dist/.
          find artifacts -type f -name 'anamnesis-*' -exec cp -f {} dist/ \;
          # Standard `sha256sum` output ("<hex>  <asset>") computed from within
          # dist/, so each line names the bare asset filename the installer looks up.
          ( cd dist && sha256sum anamnesis-* > SHA256SUMS.txt )
          echo "== SHA256SUMS.txt =="
          cat dist/SHA256SUMS.txt
      - name: upload GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        shell: bash
        run: |
          # Create the release if absent, then upload the platform binaries AND
          # their SHA256SUMS.txt. No --clobber: a tagged asset must never be
          # silently overwritten (supply-chain integrity — S1a).
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          gh release upload "$TAG" dist/anamnesis-* dist/SHA256SUMS.txt
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          check-latest: true
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest
      - name: publish npm wrapper with bootstrap token
        if: env.HAS_NPM_BOOTSTRAP_TOKEN == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: npm publish --access public
        working-directory: npm/anamnesis-mcp
      - name: publish npm wrapper with OIDC
        if: env.HAS_NPM_BOOTSTRAP_TOKEN != 'true'
        run: npm publish --access public
        working-directory: npm/anamnesis-mcp
