name: Bug Report
description: Report a bug in Anamnesis
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```rust
        use anamnesis::Engine;
        let mut engine = Engine::new();
        // ...
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages or panics if applicable.
    validations:
      required: true
  - type: input
    id: rust-version
    attributes:
      label: Rust Version
      description: "Output of `rustc --version`"
      placeholder: "rustc 1.88.0 (6b00bc388 2025-06-23)"
    validations:
      required: true
  - type: input
    id: anamnesis-version
    attributes:
      label: Anamnesis Version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information (OS, backtrace, related issues).
    validations:
      required: false
