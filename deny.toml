[graph]
all-features = true

[advisories]
ignore = [
    "RUSTSEC-2024-0436", # paste: unmaintained, transitive via fastembed → tokenizers
    "RUSTSEC-2025-0119", # number_prefix: unmaintained, transitive via fastembed → hf-hub → indicatif
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "NCSA",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
