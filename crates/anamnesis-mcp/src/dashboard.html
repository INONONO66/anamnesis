<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Anamnesis · memory dashboard</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23f0b866' stroke-width='1.6'%3E%3Ccircle cx='12' cy='12' r='3.2'/%3E%3Ccircle cx='5' cy='6' r='1.7'/%3E%3Ccircle cx='19' cy='6' r='1.7'/%3E%3Ccircle cx='5' cy='18' r='1.7'/%3E%3Ccircle cx='19' cy='18' r='1.7'/%3E%3C/svg%3E" />
<style>
  /* ─────────────────────────────────────────────────────────────────────────
     Design system — a dark "instrument panel" for a cognitive-memory graph.
     All color / spacing / type / radius values are tokens; nothing is ad-hoc.
     ───────────────────────────────────────────────────────────────────────── */
  :root {
    /* Surfaces — deep ink, layered elevation */
    --bg:          #0a0c10;
    --surface:     #11141b;
    --surface-2:   #161a23;
    --surface-3:   #1c212c;
    --border:      #262c3a;
    --border-2:    #333b4d;

    /* Text ramp */
    --text:        #e7eaf0;
    --text-dim:    #a3adc0;
    --text-muted:  #697086;

    /* Accent — warm amber (recollection); one primary, tints for state */
    --accent:      #f0b866;
    --accent-2:    #e7a24b;
    --accent-soft: rgba(240, 184, 102, 0.12);
    --accent-line: rgba(240, 184, 102, 0.34);

    /* Secondary interactive + semantics */
    --cyan:        #63c9d4;
    --danger:      #e8686a;
    --danger-soft: rgba(232, 104, 106, 0.13);
    --ok:          #6fc98a;

    /* Type */
    --font-ui:   -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

    /* Spacing scale (4px base) */
    --s1: 4px;  --s2: 8px;  --s3: 12px; --s4: 16px;
    --s5: 24px; --s6: 32px; --s7: 48px;

    /* Radius + motion */
    --r1: 6px; --r2: 10px; --r3: 14px;
    --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
  }

  * { box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    margin: 0;
    font-family: var(--font-ui);
    color: var(--text);
    background:
      radial-gradient(1200px 620px at 78% -12%, rgba(240, 184, 102, 0.07), transparent 60%),
      radial-gradient(900px 520px at 8% 0%, rgba(99, 201, 212, 0.05), transparent 55%),
      var(--bg);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
  }

  a { color: var(--cyan); text-decoration: none; }

  /* ── Header ──────────────────────────────────────────────────────────────*/
  header {
    display: flex;
    align-items: center;
    gap: var(--s4);
    padding: var(--s4) var(--s5);
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    position: sticky; top: 0; z-index: 20;
    backdrop-filter: blur(8px);
  }
  .brand { display: flex; align-items: baseline; gap: var(--s3); min-width: 0; }
  .brand h1 {
    margin: 0; font-size: 17px; font-weight: 650;
    letter-spacing: -0.02em; color: var(--text);
  }
  .brand .glyph {
    width: 20px; height: 20px; flex: none;
    color: var(--accent);
    filter: drop-shadow(0 0 10px var(--accent-line));
  }
  .brand .sub {
    font-size: 12px; color: var(--text-muted);
    letter-spacing: 0.02em; text-transform: lowercase;
  }
  .header-spacer { flex: 1; }
  .ns-pill {
    display: inline-flex; align-items: center; gap: var(--s2);
    font-family: var(--font-mono); font-size: 12px;
    color: var(--text-dim);
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 5px var(--s3); border-radius: 999px;
  }
  .ns-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }

  /* ── Buttons ─────────────────────────────────────────────────────────────*/
  button {
    font-family: var(--font-ui); font-size: 13px; color: var(--text);
    background: var(--surface-2); border: 1px solid var(--border-2);
    padding: 7px var(--s3); border-radius: var(--r1); cursor: pointer;
    transition: background 0.15s var(--ease), border-color 0.15s var(--ease),
                transform 0.06s var(--ease);
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover { background: var(--surface-3); border-color: var(--border-2); }
  button:active { transform: translateY(1px); }
  button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  button.ghost { background: transparent; border-color: transparent; color: var(--text-dim); }
  button.ghost:hover { background: var(--surface-2); color: var(--text); }
  button.danger { color: var(--danger); border-color: transparent; background: transparent; }
  button.danger:hover { background: var(--danger-soft); }
  button svg { width: 15px; height: 15px; }

  /* ── Layout ──────────────────────────────────────────────────────────────*/
  main { padding: var(--s5); max-width: 1500px; margin: 0 auto; }

  /* ── Stats strip ─────────────────────────────────────────────────────────*/
  .stats {
    display: grid; gap: var(--s3);
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    margin-bottom: var(--s5);
  }
  .stat {
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    border: 1px solid var(--border);
    border-radius: var(--r2); padding: var(--s4);
    position: relative; overflow: hidden;
  }
  .stat::before {
    content: ""; position: absolute; inset: 0 auto 0 0; width: 3px;
    background: var(--accent-line);
  }
  .stat .label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted); margin-bottom: 6px;
  }
  .stat .value {
    font-family: var(--font-mono); font-size: 24px; font-weight: 600;
    color: var(--text); letter-spacing: -0.01em; line-height: 1.1;
  }
  .stat .value small { font-size: 13px; color: var(--text-dim); font-weight: 500; }
  .stat.grade .value { color: var(--accent); }

  /* ── Toolbar ─────────────────────────────────────────────────────────────*/
  .toolbar {
    display: flex; align-items: center; flex-wrap: wrap; gap: var(--s4);
    padding: var(--s3) var(--s4); margin-bottom: var(--s4);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r2);
  }
  .toolbar .field { display: flex; align-items: center; gap: var(--s2); }
  .toolbar label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .toolbar output {
    font-family: var(--font-mono); font-size: 12px; color: var(--accent);
    min-width: 30px; text-align: right;
  }
  input[type="range"] { accent-color: var(--accent); width: 150px; }
  input[type="number"], select {
    font-family: var(--font-mono); font-size: 13px; color: var(--text);
    background: var(--surface-2); border: 1px solid var(--border-2);
    border-radius: var(--r1); padding: 6px var(--s2); width: 78px;
  }
  input:focus-visible, select:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .toolbar .count { margin-left: auto; font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }

  /* ── Content grid: table + detail ───────────────────────────────────────*/
  .grid { display: grid; grid-template-columns: minmax(0, 1fr) 400px; gap: var(--s4); align-items: start; }
  @media (max-width: 1080px) { .grid { grid-template-columns: 1fr; } }

  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--r2); overflow: hidden;
  }

  /* ── Table ───────────────────────────────────────────────────────────────*/
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; font-size: 11px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; color: var(--text-muted);
    padding: var(--s3) var(--s4); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--surface); white-space: nowrap;
  }
  tbody td { padding: var(--s3) var(--s4); border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr { cursor: pointer; transition: background 0.12s var(--ease); }
  tbody tr:hover { background: var(--surface-2); }
  tbody tr.selected { background: var(--accent-soft); box-shadow: inset 3px 0 0 var(--accent); }
  tbody tr:last-child td { border-bottom: none; }
  td.id { font-family: var(--font-mono); color: var(--text-dim); font-size: 12px; }
  td.preview { color: var(--text); max-width: 460px; }
  td.preview .txt { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  td.preview .txt.retract { text-decoration: line-through; color: var(--text-muted); }

  /* Salience meter */
  .sal { display: flex; align-items: center; gap: var(--s2); min-width: 96px; }
  .sal .bar { flex: 1; height: 5px; border-radius: 3px; background: var(--surface-3); overflow: hidden; }
  .sal .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent-2), var(--accent)); }
  .sal .num { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); width: 34px; }

  /* Badges */
  .badge {
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.02em;
    padding: 2px 8px; border-radius: 999px; white-space: nowrap;
    border: 1px solid var(--border-2); color: var(--text-dim); background: var(--surface-2);
  }
  .badge.type { color: var(--cyan); border-color: rgba(99,201,212,0.28); background: rgba(99,201,212,0.08); }
  .badge.tier-core { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }
  .badge.tier-working { color: var(--cyan); border-color: rgba(99,201,212,0.28); background: rgba(99,201,212,0.08); }
  .badge.retracted { color: var(--danger); border-color: rgba(232,104,106,0.3); background: var(--danger-soft); }

  /* ── Detail panel ────────────────────────────────────────────────────────*/
  #detail { position: sticky; top: 88px; min-height: 240px; }
  .detail-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--s3) var(--s4); border-bottom: 1px solid var(--border);
  }
  .detail-head .t { font-size: 12px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
  .detail-body { padding: var(--s4); }
  .detail-empty {
    padding: var(--s7) var(--s4); text-align: center; color: var(--text-muted);
    display: flex; flex-direction: column; align-items: center; gap: var(--s3);
  }
  .detail-empty svg { width: 34px; height: 34px; opacity: 0.5; }
  .content-block {
    font-size: 14px; line-height: 1.6; color: var(--text); white-space: pre-wrap;
    word-break: break-word; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--r1); padding: var(--s3); margin-bottom: var(--s4);
    max-height: 260px; overflow: auto;
  }
  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 6px var(--s3); font-size: 13px; }
  .kv dt { color: var(--text-muted); font-size: 12px; }
  .kv dd { margin: 0; color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; word-break: break-word; }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: var(--s2); }
  .tag { font-size: 11px; font-family: var(--font-mono); color: var(--accent); background: var(--accent-soft);
         border: 1px solid var(--accent-line); border-radius: 999px; padding: 2px 8px; }
  .detail-actions { margin-top: var(--s4); padding-top: var(--s4); border-top: 1px solid var(--border);
                    display: flex; gap: var(--s2); }

  .detail-enter { animation: slideIn 0.22s var(--ease); }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* States */
  .empty, .loading { padding: var(--s7) var(--s4); text-align: center; color: var(--text-muted); }
  .spinner {
    width: 18px; height: 18px; border-radius: 50%; display: inline-block;
    border: 2px solid var(--border-2); border-top-color: var(--accent);
    animation: spin 0.7s linear infinite; vertical-align: -3px; margin-right: var(--s2);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.7s linear infinite; }

  /* Toast */
  #toast {
    position: fixed; bottom: var(--s5); left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface-3); border: 1px solid var(--border-2); color: var(--text);
    padding: var(--s3) var(--s4); border-radius: var(--r2); font-size: 13px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); opacity: 0; pointer-events: none;
    transition: opacity 0.2s var(--ease), transform 0.2s var(--ease); z-index: 40; max-width: 90vw;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #toast.err { border-color: rgba(232,104,106,0.5); }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <svg class="glyph" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
        <circle cx="12" cy="12" r="3.2" />
        <circle cx="5" cy="6" r="1.7" /><circle cx="19" cy="6" r="1.7" />
        <circle cx="5" cy="18" r="1.7" /><circle cx="19" cy="18" r="1.7" />
        <path d="M9.4 10.4 6.3 7.2M14.6 10.4l3.1-3.2M9.4 13.6l-3.1 3.2M14.6 13.6l3.1 3.2" />
      </svg>
      <h1>Anamnesis</h1>
      <span class="sub">memory&nbsp;dashboard</span>
    </div>
    <div class="header-spacer"></div>
    <span class="ns-pill"><span class="dot"></span><span id="ns-label">default</span></span>
    <button id="refresh" class="ghost" title="Refresh (r)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 4v5h-5"/></svg>
      Refresh
    </button>
  </header>

  <main>
    <section class="stats" id="stats" aria-label="graph statistics"></section>

    <div class="toolbar">
      <div class="field">
        <label for="minsal">min salience</label>
        <input type="range" id="minsal" min="0" max="1" step="0.01" value="0" />
        <output id="minsal-out">0.00</output>
      </div>
      <div class="field">
        <label for="limit">limit</label>
        <input type="number" id="limit" min="1" max="1000" step="1" value="100" />
      </div>
      <span class="count" id="rowcount"></span>
    </div>

    <div class="grid">
      <div class="panel table-wrap">
        <table>
          <thead>
            <tr>
              <th>id</th><th>content</th><th>salience</th><th>tier</th><th>type</th><th></th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6"><div class="loading"><span class="spinner"></span>loading memories…</div></td></tr>
          </tbody>
        </table>
      </div>

      <div class="panel" id="detail">
        <div class="detail-head"><span class="t">detail</span></div>
        <div class="detail-body" id="detail-body">
          <div class="detail-empty">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="5" r="1.4"/><circle cx="20" cy="5" r="1.4"/><circle cx="4" cy="19" r="1.4"/><circle cx="20" cy="19" r="1.4"/></svg>
            <div>Select a memory to inspect its full content, metadata, and validity window.</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <div id="toast" role="status" aria-live="polite"></div>

<script>
"use strict";
(function () {
  const $ = (s) => document.querySelector(s);
  const NS = new URLSearchParams(location.search).get("namespace"); // optional UI override
  const state = { rows: [], selected: null };

  // ── helpers ──────────────────────────────────────────────────────────────
  function nsQuery(extra) {
    const p = new URLSearchParams(extra || {});
    if (NS) p.set("namespace", NS);
    const s = p.toString();
    return s ? "?" + s : "";
  }
  async function api(path, opts) {
    const res = await fetch(path, opts);
    const text = await res.text();
    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch (_e) { data = { error: text }; }
    if (!res.ok) {
      const msg = (data && data.error) ? data.error : ("HTTP " + res.status);
      throw new Error(msg);
    }
    return data;
  }
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
  function fmtTs(ms) {
    if (ms == null) return "—";
    const d = new Date(Number(ms));
    if (isNaN(d.getTime())) return String(ms);
    return d.toISOString().replace("T", " ").replace(/\.\d+Z$/, "Z");
  }
  function tierClass(tier) {
    const t = String(tier || "").toLowerCase();
    if (t.includes("core")) return "tier-core";
    if (t.includes("work")) return "tier-working";
    return "";
  }
  let toastTimer;
  function toast(msg, isErr) {
    const el = $("#toast");
    el.textContent = msg;
    el.className = "show" + (isErr ? " err" : "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ""; }, 3200);
  }

  // ── stats ────────────────────────────────────────────────────────────────
  function parseStats(text) {
    const map = {};
    for (const line of String(text || "").split("\n")) {
      const i = line.indexOf(":");
      if (i < 0) continue;
      const k = line.slice(0, i).trim();
      const v = line.slice(i + 1).trim();
      if (k && v !== "") map[k] = v;
    }
    return map;
  }
  async function loadStats() {
    try {
      const data = await api("/api/stats" + nsQuery());
      const m = parseStats(data && data.stats);
      const cards = [
        { label: "nodes",   value: m["nodes"] || "0" },
        { label: "edges",   value: m["edges"] || "0" },
        { label: "avg salience", value: m["avg salience"] || "—" },
        { label: "backlog", value: m["extraction backlog"] || "0", hint: "extraction queue" },
        { label: "grade",   value: m["health grade"] || "—", grade: true },
      ];
      $("#stats").innerHTML = cards.map((c) =>
        '<div class="stat' + (c.grade ? " grade" : "") + '">' +
          '<div class="label">' + esc(c.label) + "</div>" +
          '<div class="value">' + esc(c.value) + "</div>" +
        "</div>"
      ).join("");
    } catch (e) {
      $("#stats").innerHTML = '<div class="stat"><div class="label">stats</div><div class="value"><small>' + esc(e.message) + "</small></div></div>";
    }
  }

  // ── memories table ────────────────────────────────────────────────────────
  function salBar(v) {
    const pct = Math.max(0, Math.min(1, Number(v) || 0)) * 100;
    return '<div class="sal"><span class="bar"><i style="width:' + pct.toFixed(0) + '%"></i></span>' +
           '<span class="num">' + (Number(v) || 0).toFixed(2) + "</span></div>";
  }
  function rowHtml(m) {
    const retract = m.retracted ? " retract" : "";
    const preview = esc(m.content_preview || "");
    return '<tr data-id="' + esc(m.node_id) + '">' +
      '<td class="id">#' + esc(m.node_id) + "</td>" +
      '<td class="preview"><div class="txt' + retract + '" title="' + preview + '">' + (preview || "<span style=\"color:var(--text-muted)\">(empty)</span>") + "</div></td>" +
      "<td>" + salBar(m.salience) + "</td>" +
      '<td><span class="badge ' + tierClass(m.tier) + '">' + esc(m.tier) + "</span></td>" +
      '<td><span class="badge type">' + esc(m.node_type) + "</span></td>" +
      '<td>' + (m.retracted
          ? '<span class="badge retracted">retracted</span>'
          : '<button class="danger forget" data-id="' + esc(m.node_id) + '" title="Soft-retract this memory">forget</button>') +
      "</td></tr>";
  }
  function renderRows() {
    const tbody = $("#rows");
    if (!state.rows.length) {
      tbody.innerHTML = '<tr><td colspan="6"><div class="empty">No memories match the current filter.</div></td></tr>';
      $("#rowcount").textContent = "";
      return;
    }
    tbody.innerHTML = state.rows.map(rowHtml).join("");
    $("#rowcount").textContent = state.rows.length + (state.rows.length === 1 ? " memory" : " memories");
    if (state.selected != null) {
      const tr = tbody.querySelector('tr[data-id="' + state.selected + '"]');
      if (tr) tr.classList.add("selected");
    }
  }
  async function loadMemories() {
    const minSal = $("#minsal").value;
    const limit = $("#limit").value || "100";
    $("#rows").innerHTML = '<tr><td colspan="6"><div class="loading"><span class="spinner"></span>loading memories…</div></td></tr>';
    try {
      const data = await api("/api/memories" + nsQuery({ min_salience: minSal, limit: limit }));
      state.rows = Array.isArray(data) ? data : [];
      renderRows();
    } catch (e) {
      $("#rows").innerHTML = '<tr><td colspan="6"><div class="empty">Failed to load: ' + esc(e.message) + "</div></td></tr>";
      toast(e.message, true);
    }
  }

  // ── detail panel ───────────────────────────────────────────────────────────
  function renderDetail(m) {
    const meta = m.metadata && typeof m.metadata === "object" ? m.metadata : {};
    const metaRows = Object.keys(meta).length
      ? Object.entries(meta).map(([k, v]) => "<dt>" + esc(k) + "</dt><dd>" + esc(v) + "</dd>").join("")
      : "";
    const tags = Array.isArray(m.entity_tags) && m.entity_tags.length
      ? '<div class="tags">' + m.entity_tags.map((t) => '<span class="tag">' + esc(t) + "</span>").join("") + "</div>"
      : '<span style="color:var(--text-muted)">none</span>';

    const body =
      '<div class="detail-enter">' +
        '<div class="content-block">' + (esc(m.content) || '<span style="color:var(--text-muted)">(empty)</span>') + "</div>" +
        '<dl class="kv">' +
          "<dt>node</dt><dd>#" + esc(m.node_id) + "</dd>" +
          "<dt>type</dt><dd>" + esc(m.node_type) + "</dd>" +
          "<dt>tier</dt><dd>" + esc(m.tier) + "</dd>" +
          "<dt>salience</dt><dd>" + (Number(m.salience) || 0).toFixed(4) + "</dd>" +
          "<dt>retracted</dt><dd>" + (m.retracted ? "yes" : "no") + "</dd>" +
          "<dt>valid from</dt><dd>" + fmtTs(m.valid_from) + "</dd>" +
          "<dt>valid until</dt><dd>" + fmtTs(m.valid_until) + "</dd>" +
          "<dt>created</dt><dd>" + fmtTs(m.created_at) + "</dd>" +
          "<dt>updated</dt><dd>" + fmtTs(m.updated_at) + "</dd>" +
        "</dl>" +
        '<div style="margin-top:var(--s4)"><dt style="color:var(--text-muted);font-size:12px">entity tags</dt>' + tags + "</div>" +
        (metaRows ? '<div style="margin-top:var(--s4)"><dt style="color:var(--text-muted);font-size:12px;margin-bottom:6px">metadata</dt><dl class="kv">' + metaRows + "</dl></div>" : "") +
        '<div class="detail-actions">' +
          (m.retracted ? '<span class="badge retracted">retracted</span>'
                       : '<button class="danger" id="detail-forget" data-id="' + esc(m.node_id) + '">Forget this memory</button>') +
        "</div>" +
      "</div>";
    $("#detail-body").innerHTML = body;
    const df = $("#detail-forget");
    if (df) df.addEventListener("click", () => forget(df.dataset.id));
  }
  async function selectRow(id) {
    state.selected = String(id);
    document.querySelectorAll("#rows tr").forEach((tr) => tr.classList.toggle("selected", tr.dataset.id === state.selected));
    $("#detail-body").innerHTML = '<div class="loading"><span class="spinner"></span>loading…</div>';
    try {
      const m = await api("/api/memory/" + encodeURIComponent(id) + nsQuery());
      renderDetail(m);
    } catch (e) {
      $("#detail-body").innerHTML = '<div class="detail-empty">' + esc(e.message) + "</div>";
      toast(e.message, true);
    }
  }

  // ── forget (soft-retract) ──────────────────────────────────────────────────
  async function forget(id) {
    if (!confirm("Soft-retract memory #" + id + "? It stays in the graph but is marked retracted.")) return;
    try {
      const r = await api("/api/memory/" + encodeURIComponent(id) + "/forget" + nsQuery(), { method: "POST" });
      toast((r && r.message) || ("forgot #" + id));
      await Promise.all([loadMemories(), loadStats()]);
      if (state.selected === String(id)) selectRow(id);
    } catch (e) {
      toast(e.message, true);
    }
  }

  // ── wiring ─────────────────────────────────────────────────────────────────
  function refreshAll() { loadStats(); loadMemories(); }

  $("#rows").addEventListener("click", (ev) => {
    const btn = ev.target.closest("button.forget");
    if (btn) { ev.stopPropagation(); forget(btn.dataset.id); return; }
    const tr = ev.target.closest("tr[data-id]");
    if (tr) selectRow(tr.dataset.id);
  });
  $("#refresh").addEventListener("click", refreshAll);
  $("#minsal").addEventListener("input", () => { $("#minsal-out").textContent = Number($("#minsal").value).toFixed(2); });
  let debounce;
  const reFilter = () => { clearTimeout(debounce); debounce = setTimeout(loadMemories, 220); };
  $("#minsal").addEventListener("change", reFilter);
  $("#limit").addEventListener("change", reFilter);
  document.addEventListener("keydown", (e) => {
    if (e.key === "r" && !e.metaKey && !e.ctrlKey && document.activeElement.tagName !== "INPUT") refreshAll();
  });

  if (NS) $("#ns-label").textContent = NS;
  refreshAll();
})();
</script>
</body>
</html>
