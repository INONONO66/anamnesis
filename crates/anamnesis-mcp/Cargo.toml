[package]
name = "anamnesis-mcp"
version = "0.7.0"
edition = "2024"
# Higher than the library's 1.85: the rmcp/schemars dep tree pulls darling 0.23,
# which requires rustc 1.88. The server ships as prebuilt npm binaries, so this
# does not affect the published library's MSRV promise.
rust-version = "1.88"
license = "MIT"
description = "Anamnesis cognitive-memory MCP server (stdio) and one-shot CLI"
repository = "https://github.com/INONONO66/anamnesis"
publish = false

[[bin]]
name = "anamnesis-mcp"
path = "src/main.rs"

[dependencies]
anamnesis = { path = "../anamnesis", features = ["embed"] }
rmcp = { version = "1.7", features = ["server", "macros", "transport-io"] }
schemars = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync"] }
clap = { version = "4", features = ["derive"] }
dirs = "5"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
tempfile = "3"
