coverage:
  precision: 2
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 0%
    patch:
      default:
        target: auto

ignore:
  - "tests/**"
  - "benches/**"
  - "examples/**"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
